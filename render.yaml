# Awaaz — Render Infrastructure-as-Code
# Docs: https://render.com/docs/infrastructure-as-code
services:
  - type: web
    name: awaaz
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: awaaz-db
          property: connectionString

databases:
  - name: awaaz-db
    plan: free
    databaseName: awaaz
    user: awaaz_user
